version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: santana
      POSTGRES_DB: st_patricks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=santana
      - DB_NAME=st_patricks_db
      - JWT_SECRET=your_jwt_secret_minimum_32_characters
      - REACT_APP_API_URL=http://localhost:3000
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  postgres_data:
